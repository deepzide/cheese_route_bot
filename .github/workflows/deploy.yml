name: Deploy to VPS

on:
    push:
        branches:
            - main # Change this if your production branch is different

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4.1.1

            - name: RSYNC files to VPS
              uses: Burnett01/rsync-deployments@6.0.0
              with:
                  switches: -avzr --delete
                  path: .
                  remote_path: /home/deepzide/cheese_route_bot
                  remote_host: ${{ secrets.VPS_IP }}
                  remote_user: ${{ secrets.VPS_USERNAME }}
                  remote_key: ${{ secrets.VPS_SSH_KEY }}

            - name: Generate .env file and Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VPS_IP }}
                  username: ${{ secrets.VPS_USERNAME }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      cd /home/deepzide/cheese_route_bot

                      # Create/Overwrite .env file with all variables from GitHub Secrets
                      cat <<EOF > .env
                      ENV_STATE=${{ secrets.ENV_STATE }}
                      DATABASE_URL=${{ secrets.DATABASE_URL }}
                      ERP_HOST=${{ secrets.ERP_HOST }}
                      ERP_USER=${{ secrets.ERP_USER }}
                      ERP_PASSWORD=${{ secrets.ERP_PASSWORD }}
                      ERP_API_TOKEN=${{ secrets.ERP_API_TOKEN }}
                      OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
                      GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
                      WHATSAPP_ACCESS_TOKEN=${{ secrets.WHATSAPP_ACCESS_TOKEN }}
                      WHATSAPP_PHONE_NUMBER_ID=${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
                      WHATSAPP_VERIFY_TOKEN=${{ secrets.WHATSAPP_VERIFY_TOKEN }}
                      WHATSAPP_BOT_NUMBER=${{ secrets.WHATSAPP_BOT_NUMBER }}
                      WABA_ID=${{ secrets.WABA_ID }}
                      SENTRY_DSN=${{ secrets.SENTRY_DSN }}
                      MINUTES_BETWEEN_IMAGES=${{ secrets.MINUTES_BETWEEN_IMAGES }}
                      USE_FFMPEG=${{ secrets.USE_FFMPEG }}
                      ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}
                      TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
                      TELEGRAM_DEV_CHAT_ID=${{ secrets.TELEGRAM_DEV_CHAT_ID }}
                      TELEGRAM_BOT_TOKEN_NOTIFIER=${{ secrets.TELEGRAM_BOT_TOKEN_NOTIFIER }}
                      SERVER_HOST=${{ secrets.SERVER_HOST }}
                      EOF

                      # Deploy with Docker Compose
                      docker compose -f docker/docker-compose.yml up -d --build

                      # Clean up old images
                      docker image prune -f
